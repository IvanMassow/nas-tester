name: Sentiment Edge Lab - Scheduled Run

on:
  schedule:
    # Run every 30 minutes during market hours (Mon-Fri 13:00-21:30 UTC)
    - cron: '*/30 13-21 * * 1-5'
    # Run every hour outside market hours (catch overnight moves, weekend setup)
    - cron: '0 0-12,22-23 * * 1-5'
    # Weekend: twice daily
    - cron: '0 9,18 * * 0,6'
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run single cycle
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python3 runner.py --once

      - name: Copy report to index.html
        run: |
          if [ -f reports/latest.html ]; then
            cp reports/latest.html index.html
          fi

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
